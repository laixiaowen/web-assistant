<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>惠州学院住宿规定问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
            color: #fff;
            padding: 28px 32px 24px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.85;
        }
        .header .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 8px;
        }
        .main {
            padding: 24px 32px 32px;
        }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus {
            border-color: #2d6a9f;
        }
        .search-box button {
            padding: 14px 32px;
            background: #2d6a9f;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .search-box button:hover {
            background: #1a4a7a;
        }
        .search-box button:active {
            transform: scale(0.97);
        }
        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .quick-questions button {
            padding: 6px 14px;
            background: #f0f4f8;
            border: 1px solid #dce4ec;
            border-radius: 20px;
            font-size: 13px;
            color: #2d3748;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-questions button:hover {
            background: #e2e8f0;
            border-color: #b0c4d8;
        }
        .answer-area {
            background: #f7f9fc;
            border-radius: 12px;
            padding: 20px 24px;
            min-height: 120px;
            border-left: 4px solid #2d6a9f;
        }
        .answer-area .empty-hint {
            color: #a0aec0;
            font-size: 14px;
        }
        .answer-area .answer-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .answer-area .answer-text {
            color: #2d3748;
            font-size: 15px;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .answer-area .answer-text .source {
            color: #718096;
            font-size: 13px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e2e8f0;
        }
        .answer-area .loading {
            color: #718096;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            padding: 16px 32px 20px;
            color: #a0aec0;
            font-size: 12px;
            border-top: 1px solid #f0f2f5;
        }

        @media (max-width: 640px) {
            .container {
                border-radius: 12px;
            }
            .header {
                padding: 20px;
            }
            .header h1 {
                font-size: 20px;
            }
            .main {
                padding: 16px 18px 24px;
            }
            .search-box {
                flex-direction: column;
            }
            .search-box button {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 头部 -->
    <div class="header">
        <h1>🏠 惠州学院住宿助手</h1>
        <p>基于《外宿管理规定》和《学生公寓管理规定》智能检索</p>
        <span class="badge">📚 共 76 条规则</span>
    </div>

    <!-- 主体 -->
    <div class="main">
        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="questionInput" placeholder="输入您的问题，例如：怎么申请外宿？" />
            <button id="askBtn">提问</button>
        </div>

        <!-- 快捷问题 -->
        <div class="quick-questions" id="quickQuestions">
            <button data-q="怎么申请外宿">📝 申请外宿</button>
            <button data-q="宿舍几点熄灯">🌙 熄灯时间</button>
            <button data-q="宿舍能养宠物吗">🐱 养宠物</button>
            <button data-q="宿舍可以用电饭煲吗">🍳 违章电器</button>
            <button data-q="晚归会怎么样">⏰ 晚归规定</button>
            <button data-q="夜不归宿怎么处理">🌃 夜不归宿</button>
            <button data-q="外宿需要什么条件">📋 外宿条件</button>
            <button data-q="宿舍卫生谁负责">🧹 卫生规定</button>
            <button data-q="怎么报修">🔧 电器报修</button>
            <button data-q="怎么充电费">⚡ 电费充值</button>
            <button data-q="水卡怎么办理">💳 水卡办理</button>
        </div>

        <!-- 答案区域 -->
        <div class="answer-area" id="answerArea">
            <div class="empty-hint">💡 输入问题或点击上方快捷按钮，获取相关规定</div>
        </div>
    </div>

    <div class="footer">
        数据来源：惠院发〔2023〕149 号 · 本地知识库检索
    </div>
</div>

<script>
    // ============================================================
    // 1. 知识库数据
    // ============================================================
    const knowledgeBase = [
        // ===== 外宿规定 =====
        {
            keywords: ["外宿", "申请", "审批", "怎么申请", "如何申请", "办理外宿"],
            answer: "外宿申请程序：\n① 个人申请：向所在二级学院提出书面申请，填写《惠州学院学生外宿申请审批表》，提交户口本或相关证明材料。每年六月份办理老生外宿，九月份办理新生外宿。\n② 二级学院审核：班主任、辅导员、党总支正（副）书记签名并加盖学院公章。\n③ 审批：学生工作部（处）审核。\n④ 签订协议：首次申请通过的学生和家长到学生工作部（处）签订《学生外宿管理协议书》。"
        },
        {
            keywords: ["外宿条件", "什么条件", "才能外宿", "申请条件"],
            answer: "申请外宿必须满足下列条件之一：\n① 父母在市区内居住（以户口本或房产证为准）。\n② 因病需要治疗和休养，学校无法解决必要生活条件的（需市三级以上医院或学校心理健康教育与咨询中心证明）。\n③ 其他特殊情况需要外宿的。"
        },
        {
            keywords: ["私自外宿", "没申请", "擅自外宿", "未经批准"],
            answer: "未经批准私自外宿或租房住宿的，将：\n① 依据《惠州学院学生违纪处分办法》给予相应处分。\n② 取消该学年各级各类评优评先资格。\n③ 已授予的奖助学金和优秀称号将给予追回和撤销。\n④ 外宿过程中发生的一切事故，由学生本人负责。"
        },
        {
            keywords: ["外宿规定", "外宿要求", "外宿注意"],
            answer: "经批准外宿的学生必须遵守：\n① 注意人身安全、财产安全，增强防范意识。\n② 自觉遵守国家法律、法规和社会公德。\n③ 遵守学校规章制度，正常参加学校安排的学习、实践活动。\n④ 主动与校内同学保持联系，因外宿导致延误的一切事宜由学生自负。"
        },

        // ===== 宿舍规定 =====
        {
            keywords: ["熄灯", "几点熄灯", "关灯", "宿舍熄灯"],
            answer: "学生宿舍应于 23:30 熄灯，停止播放音响、嬉戏打闹、玩游戏等影响他人休息的活动。"
        },
        {
            keywords: ["晚归", "几点关门", "关门时间", "回来晚了"],
            answer: "晚归规定：\n① 星期日～星期四：23:00 前必须返回宿舍。\n② 星期五、星期六和节假日：23:30 前必须返回宿舍。\n③ 晚归学生需向宿管说明原因并出示证件，登记后方可进入。\n④ 屡教不改者和夜不归宿者将依据《惠州学院学生违纪处分办法》处理。"
        },
        {
            keywords: ["夜不归宿", "夜不归宿怎么处理", "不回宿舍"],
            answer: "夜不归宿是指未经批准，在指定时间（星期日～四 23:00，周五、六 23:30）至次日凌晨 6:30 期间未返回宿舍。学校将通报二级学院，告知家长，并依据《惠州学院学生违纪处分办法》视情节给予相应处理。"
        },
        {
            keywords: ["违章电器", "大功率", "电饭煲", "电磁炉", "电水壶", "什么电器不能用", "电器规定"],
            answer: "禁止使用以下违章电器：\n① 电取暖器、电热毯、电热棒、电烙铁等易引起安全事故的电器。\n② 1000W 以上的大功率电器。\n③ 电炉、电磁炉、电水壶、电饭煲、微波炉、电火锅等电炊具。\n④ 烘干机、电冰箱等。\n⑤ 无国家 3C 认证的电器。\n⑥ 电动车电池。\n也禁止乱拉乱接电线、网线，私装空调。"
        },
        {
            keywords: ["养宠物", "宠物", "猫", "狗", "动物"],
            answer: "住宿学生禁止在宿舍楼内饲养猫、狗、鼠、兔、蜥蜴等动物，或携带动物进入宿舍楼内。"
        },
        {
            keywords: ["宿舍卫生", "卫生谁负责", "打扫卫生", "垃圾"],
            answer: "宿舍卫生分工：\n① 后勤管理处物业管理中心负责公共卫生（走廊、楼梯、公共厕所等）。\n② 学生负责宿舍内卫生，垃圾须投放至一楼垃圾投放点，严禁丢放在宿舍门口。"
        },
        {
            keywords: ["文明宿舍", "评比", "宿舍评比", "优秀宿舍"],
            answer: "学校实行文明宿舍评比制度：\n① 各二级学院每学期至少开展 2 次宿舍安全卫生检查。\n② 符合标准的授予文明宿舍称号。\n③ 学生在宿舍区的表现与综合测评、先进班级评比、文明宿舍评比挂钩。"
        },
        {
            keywords: ["管理员", "宿管", "宿舍管理", "谁来管"],
            answer: "学生宿舍实行分工管理：\n① 学生工作处：负责日常行为规范管理、外宿办理、违纪处分。\n② 后勤管理处：负责住宿安排、退宿、日常管理及条件保障。\n③ 保卫处：负责治安和公共区域消防。\n④ 各二级学院：负责本学院学生的思想教育及管理。"
        },
        {
            keywords: ["退宿", "毕业退宿", "搬走", "怎么退宿"],
            answer: "退宿要求：\n① 毕业离校前须清查宿舍设施设备、交还钥匙和空调遥控器。\n② 如有损坏财物，应照价赔偿。\n③ 终止学籍（退学、肄业、毕业）、休学及离校半年以上须办理退宿手续。"
        },
        {
            keywords: ["留宿", "外人留宿", "异性留宿", "留宿外人"],
            answer: "学生宿舍禁止留宿异性和外来人员，禁止以任何方式出租床位或转让床位。"
        },
        {
            keywords: ["电动车", "电池", "充电", "电动滑板"],
            answer: "严禁电动车、电动滑板车等充电交通工具或车用电池进入宿舍或在宿舍公共区充电。"
        },
        {
            keywords: ["危险物品", "管制刀具", "危险品"],
            answer: "禁止携带或使用：管制刀具、易燃易爆品、危险化学药品、刀身长度超过 120mm 的刀具等危险物品进入宿舍楼。"
        },

        // ===== 生活服务 =====
        {
            keywords: ["报修", "电器报修", "宿舍报修", "维修", "坏了", "怎么报修"],
            answer: "宿舍电器报修流程：\n① 打开今日校园 APP。\n② 在首页或服务中找到「报修」入口。\n③ 填写报修信息（宿舍号、设备名称、故障描述）。\n④ 提交后等待维修人员联系处理。"
        },
        {
            keywords: ["电费", "充电费", "交电费", "缴电费", "电费充值"],
            answer: "电费充值流程：\n① 打开微信，搜索并关注「惠州学院服务号」。\n② 点击底部菜单「校园服务」。\n③ 选择「缴交电费」。\n④ 按提示绑定宿舍，即可在线充值。"
        },
        {
            keywords: ["水卡", "热水卡", "办理水卡", "水卡充值", "圈存"],
            answer: "水卡办理与充值流程：\n① 办理：到宿舍楼内的水卡办理机器，按提示操作办理新卡。\n② 充值：打开「塔内生活」APP或小程序，选择水卡充值。\n③ 圈存：充值完成后，持水卡到宿舍楼的水卡圈存机器刷卡，将金额写入卡中。\n④ 完成以上步骤即可正常使用热水。"
        }
    ];

    // ============================================================
    // 2. 搜索函数
    // ============================================================
    function search(query) {
        if (!query || query.trim() === "") {
            return "请先输入您的问题。";
        }

        const q = query.toLowerCase().trim();
        let bestMatch = null;
        let bestScore = 0;

        for (const item of knowledgeBase) {
            let score = 0;
            for (const kw of item.keywords) {
                if (q.includes(kw) || kw.includes(q)) {
                    score += 2;
                }
                const qWords = q.split(/[，,、\s]+/);
                for (const word of qWords) {
                    if (kw.includes(word) && word.length > 1) {
                        score += 1;
                    }
                    if (word.includes(kw) && kw.length > 1) {
                        score += 1;
                    }
                }
            }
            if (score > bestScore) {
                bestScore = score;
                bestMatch = item;
            }
        }

        if (bestMatch && bestScore > 0) {
            return bestMatch.answer;
        } else {
            return "抱歉，未找到相关内容。\n💡 建议：\n• 换个关键词试试\n• 点击上方快捷问题\n• 例如：怎么报修、怎么充电费、水卡怎么办理";
        }
    }

    // ============================================================
    // 3. 页面交互
    // ============================================================
    const input = document.getElementById('questionInput');
    const askBtn = document.getElementById('askBtn');
    const answerArea = document.getElementById('answerArea');

    function handleAsk() {
        const question = input.value.trim();
        if (!question) {
            answerArea.innerHTML = '<div style="color: #a0aec0; font-size: 14px;">⚠️ 请输入您的问题</div>';
            return;
        }

        answerArea.innerHTML = '<div class="loading">⏳ 正在查找...</div>';

        setTimeout(() => {
            const result = search(question);
            const lines = result.split('\n');
            let html = '<div class="answer-title">📌 检索结果</div><div class="answer-text">';
            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('①') || trimmed.startsWith('②') || 
                    trimmed.startsWith('③') || trimmed.startsWith('④')) {
                    html += '<div style="margin-left: 8px;">' + trimmed + '</div>';
                } else if (trimmed.startsWith('•')) {
                    html += '<div style="margin-left: 16px; color: #4a5568;">' + trimmed + '</div>';
                } else {
                    html += '<div>' + line + '</div>';
                }
            }
            html += '</div>';
            answerArea.innerHTML = html;
        }, 300);
    }

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            handleAsk();
        }
    });

    askBtn.addEventListener('click', handleAsk);

    document.querySelectorAll('#quickQuestions button').forEach(function(btn) {
        btn.addEventListener('click', function() {
            const q = btn.getAttribute('data-q');
            input.value = q;
            handleAsk();
        });
    });

    input.focus();

    console.log('惠州学院住宿规定问答系统已加载');
    console.log('共 ' + knowledgeBase.length + ' 条知识条目');
</script>

</body>
</html>
